pluginManagement {
    includeBuild("../node_modules/@react-native/gradle-plugin")
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

// 1. Plugins MUST come first
plugins { 
    id("com.facebook.react.settings") 
}

// 2. Configuration for the React plugin
extensions.configure(com.facebook.react.ReactSettingsExtension) { ex -> 
    ex.autolinkLibrariesFromCommand() 
}

// 3. Dependency Management MUST come after plugins
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.name = 'prepAI'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
include ':react-native-voice_voice'
project(':react-native-voice_voice').projectDir = new File(rootProject.projectDir, '../node_modules/@react-native-voice/voice/android')